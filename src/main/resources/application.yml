spring:
  datasource:
    url: jdbc:h2:mem:cartdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8443
  ssl:
    key-store: classpath:cart-keystore.p12
    key-store-password: password
    key-store-type: PKCS12
    key-alias: cart-ssl

